# Scene: Chat App Messaging
# Provides: send/read messages in desktop chat apps
#
# Interface:
#   send_message(app, contact, message) → message sent
#   read_messages(app, contact?) → visible messages
#
# Internal structure:
#   send_message
#   ├── focus_and_isolate(app)
#   ├── navigate_to_contact(app, contact)
#   └── input_and_send(app, message)

scene: messaging

exports:
  send_message:
    params:
      app: "WeChat | Discord | Telegram | ..."
      contact: "Contact name or channel"
      message: "Text to send"
    output: "Message sent"
    shortcut: 'python3 scripts/gui_agent.py task send_message --app {app} --param contact="{contact}" --param message="{message}"'

  read_messages:
    params:
      app: "App name"
      contact: "Contact/channel (optional)"
    output: "Visible message text"
    shortcut: 'python3 scripts/gui_agent.py task read_messages --app {app} --param contact="{contact}"'

# === Internal Implementation ===
meta_actions:
  send_message:
    steps:
      - ref: "#focus_and_isolate"
        params: { app: "{app}" }
      - ref: "#navigate_to_contact"
        params: { app: "{app}", contact: "{contact}" }
      - ref: "#input_and_send"
        params: { app: "{app}", message: "{message}" }

  focus_and_isolate:
    desc: "Bring app to front, hide others"
    steps:
      - action: focus_app
        app: "{app}"
      - action: hide_others
        app: "{app}"

  navigate_to_contact:
    desc: "Open a contact/channel — app-specific logic"
    # Reads apps/{app}.json for navigation method
    per_app:
      WeChat:
        method: "sidebar OCR click"
        steps:
          - action: ocr_find
            text: "{contact}"
            region: "sidebar (x < sidebar_width)"
          - action: click
            target: "OCR match position"
        lessons:
          - "Do NOT use Cmd+F (opens web search 搜一搜)"
          - "Re-clicking highlighted chat is a no-op — click away first"
      Discord:
        method: "Cmd+K quick switcher"
        steps:
          - action: shortcut
            key: "k"
            modifiers: "command"
          - action: type
            text: "{contact}"
          - action: press_key
            key: "return"
      Telegram:
        method: "Cmd+F search"
        steps:
          - action: shortcut
            key: "f"
            modifiers: "command"
          - action: type
            text: "{contact}"
          - action: press_key
            key: "return"

  input_and_send:
    desc: "Type message in input field and send"
    steps:
      - action: click
        note: "Click input field — position from app profile or OCR"
      - action: type
        text: "{message}"
      - action: press_key
        key: "return"
    per_app:
      WeChat:
        input_method: "window_calc (OCR can't see faint placeholder)"
        send: "Enter"
      Discord:
        input_method: "OCR 'Message #channel-name'"
        send: "Enter"
      Telegram:
        input_method: "OCR 'Write a message'"
        send: "Enter"
