# Scene: VPN Reconnect (GlobalProtect + CityU SSO)
# Provides: restore VPN connection
#
# Interface (what callers see):
#   full_reconnect() → VPN connected, SSH works
#
# Internal structure (only loaded when this scene is entered):
#   full_reconnect
#   ├── check_status()               → connected | disconnected | login_pending
#   ├── restart_gp()                 → clean GP state
#   ├── initiate_connect()           → SSO window open
#   ├── sso_login()                  → authenticated
#   │   ├── click_next()
#   │   ├── get_field_positions()    → {field_center, verify_center}
#   │   ├── ref: 1password#get_password  → password in clipboard
#   │   └── enter_password()         → Verify clicked
#   └── verify_connection()          → SSH OK

scene: vpn-reconnect
depends_on:
  - scenes/1password.yaml

exports:
  full_reconnect:
    params: {}
    output: "VPN connected, SSH accessible"

# === Internal Implementation ===
meta_actions:
  full_reconnect:
    steps:
      - ref: "#check_status"
      - ref: "#restart_gp"
        condition: "status != connected"
      - ref: "#initiate_connect"
      - ref: "#sso_login"
      - ref: "#verify_connection"

  check_status:
    desc: "Determine VPN state via AX"
    steps:
      - action: ax_scan
        app: "GlobalProtect"
    output:
      connected: "'Disconnect' button exists"
      disconnected: "'Connect' button exists"
      login_pending: "SSO window open"

  restart_gp:
    desc: "Clean restart GlobalProtect"
    steps:
      - action: quit_app
        app: "GlobalProtect"
      - action: wait
        seconds: 3
      - action: open_app
        app: "GlobalProtect"
      - action: wait
        seconds: 5

  initiate_connect:
    desc: "Open panel and click Connect"
    steps:
      - action: ax_click
        note: "menuBars[1].menuBarItems[0].click()"
      - action: wait
        seconds: 2
      - action: ax_click
        name: "Connect"
      - action: wait
        seconds: 7
        note: "SSO window loads slowly"

  sso_login:
    desc: "Complete SSO authentication"
    steps:
      - ref: "#click_next"
      - action: wait
        seconds: 4
      - ref: "#get_field_positions"
      - ref: "scenes/1password.yaml#get_password"    # ← cross-scene reference
        params:
          entry: "CityU"
          verify: { username: "zichuanfu2", strength: "Fair" }
      - ref: "#enter_password"
    lessons:
      - "Get password AFTER field is visible (minimize 90s TTL window)"
      - "WebView: osascript keystroke doesn't work — cliclick only"

  click_next:
    steps:
      - action: ax_scan
        app: "GlobalProtect"
        window: "GlobalProtect Login"
        find: { role: "AXButton", title: "Next" }
      - action: ax_click
        fallback: "cliclick c:{position} if AX click fails"

  get_field_positions:
    desc: "Locate password field and Verify button"
    steps:
      - action: ax_scan
        app: "GlobalProtect"
        window: "GlobalProtect Login"
        find:
          - { role: "AXTextField", output: "field_center" }
          - { role: "AXButton", title: "Verify", output: "verify_center" }
    output:
      field_center: "Math.round(pos + size/2)"
      verify_center: "Math.round(pos + size/2)"
    lessons:
      - "Coordinates change on window move — always re-query"
      - "Integer coords only for cliclick"

  enter_password:
    desc: "Paste password and click Verify"
    steps:
      - action: click
        target: "{field_center}"
      - action: paste
      - action: wait
        seconds: 0.3
      - action: click
        target: "{verify_center}"
    lessons:
      - "Cmd+V paste, NOT cliclick t: (special chars truncate)"
      - "cliclick kp:return does NOT trigger Verify in WebView"

  verify_connection:
    desc: "Test SSH to confirm VPN is up"
    steps:
      - action: wait
        seconds: 8
      - cmd: "sshpass -p '{ssh_pass}' ssh -o ConnectTimeout=5 {ssh_host} 'echo OK'"
    on_failure:
      - ref: "#retry_login"
        max_retries: 3

  retry_login:
    steps:
      - action: ax_scan
        find: { role: "AXLink", title: "Back to sign in" }
      - action: click
        target: "link position"
      - action: wait
        seconds: 2
      - ref: "#sso_login"

gotchas:
  - "SSO password ≠ SSH password"
  - "SSO page times out — be fast"
  - "GP WebView steals focus from everything"
  - "Credentials belong in TOOLS.md, not here"
