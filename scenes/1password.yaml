# Scene: 1Password
# Provides: password retrieval from 1Password GUI
#
# Interface (what callers see):
#   get_password(entry, verify) → clipboard contains password
#
# Internal structure (only loaded when this scene is entered):
#   get_password
#   ├── select_entry(search)       → correct entry highlighted
#   ├── verify_entry(expected)     → confirmed correct entry
#   └── copy_password()            → password in clipboard

scene: 1password

# === Public Interface ===
# Other scenes reference: scenes/1password.yaml#get_password
exports:
  get_password:
    params:
      entry: "Search term (e.g. 'CityU')"
      verify: "Expected {username, website, strength} to confirm"
    output: "Password copied to clipboard (90s TTL)"

# === Internal Implementation ===
meta_actions:
  get_password:
    steps:
      - action: focus_app
        app: "1Password"
      - ref: "#select_entry"
        params: { search: "{entry}" }
      - ref: "#verify_entry"
        params: { expected: "{verify}" }
      - ref: "#copy_password"

  select_entry:
    desc: "Search and select an entry"
    params:
      search: "Keyword to search"
    steps:
      - action: shortcut         # Cmd+F to open search
        key: "f"
        modifiers: "command"
      - action: wait
        seconds: 0.3
      - action: shortcut         # Select all existing search text
        key: "a"
        modifiers: "command"
      - action: type             # Type new search term
        text: "{search}"
      - action: wait             # Wait for results
        seconds: 1.5
      - action: press_key        # Select first result
        key: "return"
      - action: wait
        seconds: 1
    lessons:
      - "Multiple entries may match — verify after selecting"
      - "Press Escape first to clear stale search state"

  verify_entry:
    desc: "Confirm correct entry is showing in detail panel"
    params:
      expected: "Dict: {username, website, strength}"
    steps:
      - action: screenshot
        path: "/tmp/1p_verify.png"
      # Agent analyzes screenshot to check username, website, password strength
    lessons:
      - "CityU has multiple entries: login (zichuanfu2/banweb), credit card (5520****), Underline — check carefully"

  copy_password:
    desc: "Click password dots (●●●●) to auto-copy to clipboard"
    steps:
      - action: screenshot
        path: "/tmp/1p_dots.png"
      # Agent identifies dots location from screenshot or known position
      - action: click
        note: "Click the ●●●● area → auto-copies to clipboard"
    verify:
      - cmd: 'echo ${#$(pbpaste)}'
        note: "Check clipboard has expected length"
    lessons:
      - "Clicking dots is simplest — no menu navigation needed"
      - "Edit → Copy Password is fallback if dots position unknown"

gotchas:
  - "90s clipboard TTL — copy immediately before use"
  - "op CLI needs Touch ID — won't work headless"
  - "Other apps (GP SSO) steal focus during 1Password operations"
