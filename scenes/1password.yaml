# Scene: 1Password Credential Retrieval
# Goal: Copy a password from 1Password to clipboard

scene: 1password
goal: "Get a credential from 1Password into clipboard"

meta_actions:
  get_password:
    desc: "Copy a specific entry's password to clipboard"
    params:
      entry: "Search term for the entry"
      verify: "Expected username/website/strength to confirm correct entry"
    steps:
      - action: focus_app
        app: "1Password"
      - ref: "#select_entry"
        params: { search: "{entry}" }
      - ref: "#verify_entry"
        params: { expected: "{verify}" }
      - ref: "#copy_password"
    output: "Password in clipboard (90s TTL)"
    lessons:
      - "Multiple entries with same name — always verify before copying"
      - "Clipboard auto-clears after 90s — use immediately"

  select_entry:
    desc: "Search and select an entry in 1Password"
    params:
      search: "Search keyword"
    steps:
      - action: shortcut
        key: "f"
        modifiers: "command"
      - action: wait
        seconds: 0.3
      - action: shortcut
        key: "a"
        modifiers: "command"
      - action: type
        text: "{search}"
      - action: wait
        seconds: 1.5
      - action: press_key
        key: "return"
      - action: wait
        seconds: 1
    lessons:
      - "Search terms may match multiple entries (logins, credit cards, identities)"
      - "Press Escape first to clear previous search"

  verify_entry:
    desc: "Confirm the selected entry is correct by checking detail panel"
    params:
      expected: "Dict with username, website, strength to check"
    steps:
      - action: screenshot
        path: "/tmp/1p_verify.png"
      # Agent uses vision to verify username, website, password strength match
    lessons:
      - "CityU login: username=zichuanfu2, website=banweb.cityu.edu.hk, strength=Fair"
      - "CityU credit card (5520****6625) is a different entry — wrong one!"

  copy_password:
    desc: "Click the password dots to auto-copy to clipboard"
    steps:
      # Method 1: Click dots (preferred — simplest)
      - action: screenshot
        path: "/tmp/1p_dots.png"
      # Agent identifies dots location from screenshot
      - action: click
        note: "Click the ●●●● area in detail panel"
      # Method 2: Edit menu (fallback)
      # - action: ax_menu
      #   app: "1Password"
      #   menu: "Edit"
      #   item: "Copy Password"
    verify:
      - cmd: 'echo ${#$(pbpaste)}'
        expect: "Expected password length"
    lessons:
      - "Clicking dots is the simplest method — auto-copies to clipboard"
      - "Edit → Copy Password works too but requires correct entry selected"
      - "op CLI needs Touch ID — won't work headless"

gotchas:
  - "1Password clipboard TTL: 90 seconds — copy as the LAST step before pasting"
  - "op CLI requires Touch ID on Mac — cannot automate remotely"
  - "Focus stealing: other apps (GP SSO) can grab focus during 1Password operations"
  - "Cmd+Shift+C copies password but less reliable than clicking dots"
