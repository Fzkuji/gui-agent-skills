# WeChat Sub-scene: Scroll History
#
# Interface:
#   scroll_history(contact?, pages?) → collected text from each page
#
# Steps:
#   1. activate WeChat
#   2. navigate to contact (if specified)
#   3. click chat area (ensure scroll focus)
#   4. Page Up × 3 per page, OCR after each page
#   5. End key to return to bottom

params:
  contact: "Contact name (optional)"
  pages: "Number of pages to scroll up (default 3)"

meta_actions:

  navigate:
    condition: "only if contact param provided"
    ref: "send_message.yaml#navigate_to_contact"

  ensure_scroll_focus:
    desc: "Click middle of chat area so Page Up scrolls messages, not sidebar"
    method: "window_calc"
    formula: "x = win_x + sidebar + (win_w - sidebar) / 2, y = win_y + win_h / 2"

  scroll_and_read:
    desc: "Page Up × 3, then OCR, repeat for each page"
    per_page:
      - action: press_key
        key: "page_up"
        repeat: 3
        delay: 0.2
      - action: observe
        returns: "main area text"
    after_all:
      - action: press_key
        key: "end"
        note: "Return to bottom of chat"

  note: "Read-only — no need to hide other apps"
