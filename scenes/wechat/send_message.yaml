# WeChat Sub-scene: Send Message
#
# Interface:
#   send_message(contact, message) → message sent
#
# Steps:
#   1. focus app
#   2. navigate to contact (sidebar click → search fallback)
#   3. click input field (window_calc)
#   4. paste message + Enter
#   5. verify (OCR spot check)

params:
  contact: "Contact name (full or partial)"
  message: "Text to send"

meta_actions:

  navigate_to_contact:
    desc: "Open a contact's chat window"
    strategy:
      - try: "OCR find contact in sidebar (x < 430)"
        on_success: "click → chat opens"
        on_fail: "go to search"
      - try: "Click search_bar template → paste contact → wait 1s"
        then: "OCR find contact in results"
        filter:
          skip_y_max: 220       # skip search box text
          skip_prefix: ["Q "]   # skip search suggestions
        on_success: "click result → chat opens"
        on_fail: "contact not found"
    lessons:
      - "Do NOT use Cmd+F — opens '搜一搜' web search"
      - "Re-clicking highlighted chat is a no-op — click away first"
      - "First OCR match for contact name is often the search box itself"

  find_input_field:
    desc: "Click the message input field"
    method: "window_calc"
    formula: "x = win_x + 250 + (win_w - 250) / 2, y = win_y + win_h - 80"
    why: "OCR cannot see placeholder text (too faint)"

  type_and_send:
    desc: "Paste message and send"
    steps:
      - action: paste
        text: "{message}"
      - action: press_key
        key: "return"
    note: "Enter sends, not Cmd+Enter"

  verify:
    method: "ocr"
    check: "First 10 chars of message visible in main area (x > sidebar_x)"
    speed: "~1.6s"
