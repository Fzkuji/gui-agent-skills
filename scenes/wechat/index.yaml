# Scene: WeChat (macOS Desktop)
# A complex app scene with multiple sub-scenes.
#
# Sub-scenes:
#   send_message.yaml  — Send a message to a contact
#   read_messages.yaml — Read visible messages in a chat
#   scroll_history.yaml — Scroll up to read older messages
#
# Dependencies:
#   - apps/wechat.json (UI layout config)
#   - actions/_actions.yaml (atomic operations)
#
# Shortcuts (gui_agent.py):
#   task send_message --app WeChat --param contact="X" --param message="Y"
#   task read_messages --app WeChat --param contact="X"
#   task scroll_history --app WeChat --param contact="X" --param pages="3"

scene: wechat
app: WeChat
profile: apps/wechat.json

exports:
  send_message: { ref: "send_message.yaml" }
  read_messages: { ref: "read_messages.yaml" }
  scroll_history: { ref: "scroll_history.yaml" }

# Shared knowledge across all WeChat sub-scenes
layout:
  sidebar_width: 250
  sidebar_x_max: 430
  input_bottom_offset: 80

quirks:
  accessibility: "Essentially useless (5 elements). Use OCR + templates."
  input_placeholder: "OCR can't see it — too faint. Use window_calc."
  cmd_f: "Opens web search '搜一搜', not contact search. Never use."
  selected_chat: "Clicking already-selected chat doesn't reopen. Click away first."
  encoding: "Always LANG=en_US.UTF-8 before paste."
  search_bar: "Template available but search flow fragile. Prefer sidebar click."
