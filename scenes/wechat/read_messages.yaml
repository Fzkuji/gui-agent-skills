# WeChat Sub-scene: Read Messages
#
# Interface:
#   read_messages(contact?) → visible message text
#
# Steps:
#   1. activate WeChat (no need to hide others — read-only)
#   2. navigate to contact (if specified)
#   3. OCR the main area → return text

params:
  contact: "Contact name (optional, reads current chat if omitted)"

meta_actions:

  navigate:
    desc: "Navigate to contact if specified"
    condition: "only if contact param provided"
    ref: "send_message.yaml#navigate_to_contact"

  read:
    desc: "OCR the chat area"
    method: "observe --app WeChat"
    returns: "main area text items"
    note: "Read-only — no need to hide other apps"
