# Scene: Discord
# All automation for Discord desktop app (macOS)
#
# Interface:
#   send_message(contact, message) → message sent
#   read_messages(contact?) → visible messages
#
# Dependencies:
#   - apps/discord.json (UI layout config)
#   - actions/_actions.yaml (atomic operations)

scene: discord
app: Discord
profile: apps/discord.json

exports:
  send_message:
    params: { contact: "Channel or DM name", message: "Text to send" }
    output: "Message sent"

  read_messages:
    params: { contact: "Channel or DM (optional)" }
    output: "Visible message text"

meta_actions:

  navigate_to_contact:
    desc: "Open a channel or DM"
    strategy:
      - try: "OCR find in sidebar (x < 312)"
        on_fail: "Cmd+K quick switcher → type name → Enter"
    lessons:
      - "Cmd+K is the most reliable way to navigate Discord"
      - "Accessibility API excellent (1362 elements) — can use AX for precise clicks"

  find_input_field:
    method: "ocr"
    keyword: "Message #"
    fallback: "window_calc (sidebar=312, bottom_offset=60)"

  send:
    key: "return"
    note: "Enter sends, Shift+Enter for newline"

layout:
  server_list_width: 72
  channel_sidebar_width: 240
  sidebar_x_max: 312
  input_bottom_offset: 60

quirks:
  accessibility: "Excellent (1362 elements). AX scan works well."
  quick_switcher: "Cmd+K — best way to navigate to any channel/DM."
  newline: "Shift+Enter for newline, Enter sends."
