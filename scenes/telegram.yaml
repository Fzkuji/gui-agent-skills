# Scene: Telegram
# All automation for Telegram desktop app (macOS)
#
# Interface:
#   send_message(contact, message) → message sent
#   read_messages(contact?) → visible messages
#
# Dependencies:
#   - apps/telegram.json (UI layout config)
#   - actions/_actions.yaml (atomic operations)

scene: telegram
app: Telegram
profile: apps/telegram.json

exports:
  send_message:
    params: { contact: "Contact or group name", message: "Text to send" }
    output: "Message sent"

  read_messages:
    params: { contact: "Contact/group (optional)" }
    output: "Visible message text"

meta_actions:

  navigate_to_contact:
    desc: "Open a contact or group chat"
    strategy:
      - try: "OCR find in sidebar (x < 400)"
        on_fail: "Cmd+F search → type name → Enter"

  find_input_field:
    method: "ocr"
    keyword: "Write a message"
    fallback: "window_calc (sidebar=300, bottom_offset=50)"

  send:
    key: "return"
    note: "Enter sends by default (configurable in settings)"

layout:
  sidebar_width: 300
  sidebar_x_max: 400
  input_bottom_offset: 50

quirks:
  search: "Cmd+F works well for finding contacts."
  send_key: "Enter sends by default, but user can change to Cmd+Enter in settings."
