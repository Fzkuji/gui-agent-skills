# Scene: Explore a New App
# Provides: understand an unknown app's UI for automation
#
# Interface:
#   full_exploration(app) → app profile created, UI mapped
#
# Internal structure:
#   full_exploration
#   ├── ax_recon(app)        → element count, AX quality assessment
#   ├── ocr_recon(app)       → text content & positions (if AX poor)
#   ├── screenshot_recon()   → visual layout (if complex)
#   └── create_profile(app)  → apps/{app}.json

scene: app-explore

exports:
  full_exploration:
    params:
      app: "App name to explore"
    output: "App profile JSON + UI knowledge"

meta_actions:
  full_exploration:
    steps:
      - ref: "#ax_recon"
        params: { app: "{app}" }
      - ref: "#ocr_recon"
        condition: "ax_quality < 10 elements"
      - ref: "#screenshot_recon"
        condition: "layout still unclear"
      - ref: "#create_profile"

  ax_recon:
    desc: "Assess AX quality — determines entire automation strategy"
    steps:
      - action: focus_app
        app: "{app}"
      - action: ax_scan
        app: "{app}"
    output:
      element_count: "Total AX elements"
      quality_tier:
        excellent: "> 100 elements → AX-first strategy"
        mixed: "10-100 → AX for buttons, OCR for content"
        poor: "< 10 → OCR-first, template match for recurring elements"
        webview: "Elements but no interaction → cliclick only"

  ocr_recon:
    desc: "OCR when AX is insufficient"
    steps:
      - cmd: 'python3 scripts/gui_agent.py observe --app {app}'
      - action: ocr_find
        text: ""
        note: "Full text dump"
    output: "All visible text with coordinates"

  screenshot_recon:
    desc: "Visual analysis (last resort)"
    steps:
      - action: screenshot
        path: "/tmp/app_explore.png"
      # Agent uses vision model to understand layout

  create_profile:
    desc: "Generate apps/{app}.json from collected info"
    template:
      app: "{app}"
      process_name: "{app}"
      layout: { sidebar_width: 250, input_bottom_offset: 60 }
      navigation: { method: "to be determined", search_shortcut: null }
      input: { method: "to be determined" }
      send: { key: "return" }
      quirks: []

what_to_document:
  - "Window regions: sidebar, main area, input field"
  - "AX quality and which elements are accessible"
  - "WebView vs native?"
  - "Keyboard shortcuts for search, send"
  - "Quirks: auto-lock, focus stealing, non-standard input"
